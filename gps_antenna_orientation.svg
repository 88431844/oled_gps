<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1f77b4"/>
    </marker>
    <style>
      .title{font:700 34px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#111827}
      .label{font:600 24px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#111827}
      .small{font:20px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#374151}
      .bad{fill:#dc2626}.good{fill:#16a34a}.blue{fill:#1f77b4}
      .card{fill:#f8fafc;stroke:#cbd5e1;stroke-width:3;rx:28}
    </style>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>
  <text x="550" y="55" text-anchor="middle" class="title">NEO-6M GPS 陶瓷贴片天线朝向示意</text>

  <rect x="60" y="100" width="460" height="540" class="card"/>
  <text x="290" y="145" text-anchor="middle" class="label good">正确：天线面朝天空</text>
  <path d="M130 235 C210 145, 370 145, 450 235" fill="none" stroke="#60a5fa" stroke-width="8"/>
  <circle cx="180" cy="220" r="9" fill="#f59e0b"/>
  <circle cx="290" cy="180" r="9" fill="#f59e0b"/>
  <circle cx="400" cy="220" r="9" fill="#f59e0b"/>
  <text x="290" y="270" text-anchor="middle" class="small">天空 / 卫星方向</text>
  <line x1="290" y1="295" x2="290" y2="395" stroke="#1f77b4" stroke-width="8" marker-end="url(#arrow)"/>
  <rect x="175" y="405" width="230" height="45" fill="#d1d5db" stroke="#6b7280" stroke-width="3"/>
  <rect x="205" y="450" width="170" height="28" fill="#2563eb" stroke="#1e40af" stroke-width="3"/>
  <text x="290" y="435" text-anchor="middle" class="small">陶瓷贴片天线</text>
  <text x="290" y="472" text-anchor="middle" font="16px Arial" fill="#fff">GPS PCB / 模块</text>
  <path d="M120 540 H460" stroke="#a3a3a3" stroke-width="4"/>
  <text x="290" y="585" text-anchor="middle" class="small">贴片的平面朝上，背面/PCB 朝下</text>
  <text x="290" y="615" text-anchor="middle" class="small">放窗外或开阔处，远离金属和 Wi‑Fi 天线</text>

  <rect x="580" y="100" width="460" height="540" class="card"/>
  <text x="810" y="145" text-anchor="middle" class="label bad">错误：侧着/被遮挡</text>
  <path d="M650 235 C730 145, 890 145, 970 235" fill="none" stroke="#93c5fd" stroke-width="8" opacity="0.45"/>
  <circle cx="700" cy="220" r="9" fill="#f59e0b" opacity="0.45"/>
  <circle cx="810" cy="180" r="9" fill="#f59e0b" opacity="0.45"/>
  <circle cx="920" cy="220" r="9" fill="#f59e0b" opacity="0.45"/>
  <text x="810" y="270" text-anchor="middle" class="small">信号被削弱或挡住</text>
  <g transform="translate(810 435) rotate(90)">
    <rect x="-115" y="-22" width="230" height="45" fill="#d1d5db" stroke="#6b7280" stroke-width="3"/>
    <rect x="-85" y="23" width="170" height="28" fill="#2563eb" stroke="#1e40af" stroke-width="3"/>
  </g>
  <line x1="720" y1="350" x2="900" y2="520" stroke="#dc2626" stroke-width="12"/>
  <line x1="900" y1="350" x2="720" y2="520" stroke="#dc2626" stroke-width="12"/>
  <text x="810" y="585" text-anchor="middle" class="small">不要让贴片侧立、朝墙、朝室内</text>
  <text x="810" y="615" text-anchor="middle" class="small">不要被屏幕、支架、金属、人体遮挡</text>
</svg>
